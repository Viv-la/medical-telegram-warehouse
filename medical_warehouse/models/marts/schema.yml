version: 2

models:
  - name: dim_channels
    description: Dimension table containing Telegram channel metadata.
    columns:
      - name: channel_key
        tests:
          - unique
          - not_null
      - name: channel_name
        tests:
          - not_null

  - name: dim_dates
    description: Date dimension for analyzing posting trends.
    columns:
      - name: date_key
        tests:
          - unique
          - not_null
      - name: full_date
        tests:
          - not_null

  - name: fct_messages
    description: Fact table containing cleaned Telegram message records.
    columns:
      - name: message_id
        tests:
          - unique
          - not_null
      - name: channel_key
        tests:
          - not_null
      - name: date_key
        tests:
          - not_null